<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Vertical - Sliding Bar Right</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial Black', Gadget, sans-serif;
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center; 
            align-items: center;     
            min-height: 100vh;       
        }

        .navbar {
            background-color: #000;
            padding: 30px;
            min-width: 350px;
        }

        .nav-links {
            list-style: none;
            display: flex;
            flex-direction: column;
            align-items: flex-start; 
        }

        .nav-links li {
            position: relative;
            width: 100%;
            margin-bottom: 10px;
            overflow: hidden; /* Garante que a barra não saia do limite do li */
        }

        .nav-links a {
            display: block;
            padding: 15px 40px;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 42px;
            font-weight: 900;
            letter-spacing: 2px;
            color: transparent;
            -webkit-text-stroke: 1px rgba(0, 210, 255, 0.4);
            
            background-image: linear-gradient(#00d2ff, #00d2ff);
            background-repeat: no-repeat;
            background-size: 0% 100%;
            background-position: left;
            -webkit-background-clip: text;
            
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* HOVER: PREENCHE O TEXTO */
        .nav-links a:hover {
            background-size: 100% 100%;
            -webkit-text-stroke: 1px #00d2ff;
            filter: drop-shadow(0 0 8px #00d2ff);
            padding-left: 50px;
        }

        /* BARRA QUE DESLIZA */
        .nav-links a::after {
            content: '';
            position: absolute;
            left: -10px; /* Começa um pouco fora à esquerda */
            top: 50%;
            transform: translateY(-50%);
            width: 8px;
            height: 70%;
            background-color: #00d2ff;
            box-shadow: 0 0 15px #00d2ff;
            
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            pointer-events: none;
        }

        /* HOVER DA BARRA: DESLIZA PARA A DIREITA */
        .nav-links a:hover::after {
            left: 100%; /* Atravessa até o final */
            transform: translateY(-50%) translateX(-100%);
            opacity: 1;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Team</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

</body>
</html>
